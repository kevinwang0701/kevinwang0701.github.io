<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="《狂熱打蚊子》— 一款刺激的網頁打蚊子遊戲！點擊、連擊、升級武器，消滅所有蚊子！">
    <title>狂熱打蚊子 Mosquito Frenzy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 遊戲主畫布 -->
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
    </div>

    <!-- 全域錯誤捕捉（在 module 載入之前） -->
    <script>
        // 偵測是否透過 file:// 開啟（ES6 Module 不支援 file://）
        if (window.location.protocol === 'file:') {
            document.addEventListener('DOMContentLoaded', function() {
                var canvas = document.getElementById('game-canvas');
                if (canvas) {
                    var ctx = canvas.getContext('2d');
                    canvas.width = 960;
                    canvas.height = 540;
                    ctx.fillStyle = '#1a1a2e';
                    ctx.fillRect(0, 0, 960, 540);
                    ctx.fillStyle = '#ff6644';
                    ctx.font = 'bold 32px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('⚠️ 請透過 HTTP Server 開啟', 480, 170);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '20px Arial';
                    ctx.fillText('ES6 Module 不支援 file:// 協定', 480, 220);
                    ctx.fillStyle = '#88ccff';
                    ctx.font = '18px monospace';
                    ctx.fillText('請在 WSL 終端機中執行：', 480, 280);
                    ctx.fillStyle = '#44ff88';
                    ctx.font = 'bold 18px monospace';
                    ctx.fillText('python3 -m http.server 8080', 480, 310);
                    ctx.fillStyle = '#88ccff';
                    ctx.font = '18px monospace';
                    ctx.fillText('然後在瀏覽器開啟：', 480, 360);
                    ctx.fillStyle = '#44ff88';
                    ctx.font = 'bold 18px monospace';
                    ctx.fillText('http://localhost:8080', 480, 390);
                }
            });
        }

        window.addEventListener('error', function(e) {
            console.error('🚨 全域錯誤:', e.message, e.filename, e.lineno);
            var canvas = document.getElementById('game-canvas');
            if (canvas && !window._errorShown) {
                window._errorShown = true;
                var ctx = canvas.getContext('2d');
                canvas.width = 960;
                canvas.height = 540;
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, 960, 540);
                ctx.fillStyle = '#ff4444';
                ctx.font = '28px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('⚠️ 遊戲載入錯誤', 480, 200);
                ctx.fillStyle = '#ffffff';
                ctx.font = '16px monospace';
                // 截斷過長的錯誤訊息
                var msg = (e.message || 'Unknown error');
                if (msg.length > 80) msg = msg.substring(0, 80) + '...';
                ctx.fillText(msg, 480, 250);
                ctx.fillStyle = '#aaaaaa';
                ctx.font = '14px monospace';
                var loc = (e.filename || '').split('/').pop() + ':' + (e.lineno || '');
                ctx.fillText(loc, 480, 280);
                ctx.fillStyle = '#88ccff';
                ctx.font = '16px Arial';
                ctx.fillText('請按 F12 開啟 DevTools Console 查看詳細錯誤', 480, 330);
            }
        });

        window.addEventListener('unhandledrejection', function(e) {
            console.error('🚨 未處理的 Promise 錯誤:', e.reason);
        });
    </script>

    <!-- 使用 ES6 Module 載入遊戲進入點（?v= 用於 cache-busting） -->
    <script type="module" src="js/main.js?v=3"></script>
</body>
</html>
